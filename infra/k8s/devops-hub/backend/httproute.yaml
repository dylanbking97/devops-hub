apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: backend
  namespace: devops-hub
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        # Argo Rollouts plugin mutates these weights during canary steps.
        - name: backend-stable
          port: 8000
          weight: 100
        - name: backend-canary
          port: 8000
          weight: 0
