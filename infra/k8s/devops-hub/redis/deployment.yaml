apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: devops-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          # Periodic RDB snapshot — basic durability without enabling AOF
          args: ["--save", "60", "1"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        # emptyDir is fine for session data in this project.
        # For persistent sessions across pod restarts, replace with a PVC.
        - name: data
          emptyDir: {}
