# External Secrets Operator: syncs secrets from external stores (GCP Secret
# Manager, Vault, AWS SM, etc.) into K8s Secrets. Lets us keep the GitHub PAT
# in GCP Secret Manager so it survives cluster spin-down/up cycles.
#
# Auth: the ESO controller SA is annotated for Workload Identity, mapped to
# GCP SA `eso-sm-reader@…` which has secretmanager.secretAccessor on the PAT.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: "0.10.x"
    helm:
      values: |
        installCRDs: true
        # Annotation goes on the controller SA — only that pod talks to GCP SM.
        serviceAccount:
          create: true
          name: external-secrets
          annotations:
            iam.gke.io/gcp-service-account: eso-sm-reader@project-385a0cab-c44a-4b07-926.iam.gserviceaccount.com
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
