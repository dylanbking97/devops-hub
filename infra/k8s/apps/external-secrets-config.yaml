# Syncs ESO custom resources (ClusterSecretStore, ExternalSecret) from git.
# Separate from the chart app so the CRDs install first (sync-wave 0) and
# these CRs apply afterward (sync-wave 1).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/dylanbking97/devops-hub.git
    targetRevision: main
    path: infra/k8s/external-secrets
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 2m
    syncOptions:
      # CRDs may not be ready on first sync — let it retry without dry-run.
      - SkipDryRunOnMissingResource=true
