# Installs Traefik via its official Helm chart, managed by ArgoCD.
# Traefik acts as the cluster ingress controller — it receives external traffic
# from the GKE LoadBalancer and routes it to services via IngressRoute CRDs.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://traefik.github.io/charts
    chart: traefik
    targetRevision: "32.x"
    helm:
      values: |
        deployment:
          replicas: 1
        service:
          type: LoadBalancer
        # Dashboard exposed on :9000/dashboard (disable or add auth in production)
        ingressRoute:
          dashboard:
            enabled: true
        providers:
          kubernetesCRD:
            enabled: true
            allowCrossNamespace: true
          kubernetesIngress:
            enabled: false
          kubernetesGateway:
            enabled: true
        gateway:
          listeners:
            web:
              port: 80
              protocol: HTTP
        ports:
          web:
            port: 80
            expose:
              default: true
          websecure:
            port: 443
            expose:
              default: true
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
