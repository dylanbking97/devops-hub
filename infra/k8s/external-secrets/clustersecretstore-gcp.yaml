# Cluster-scoped store so ExternalSecrets in any namespace can reference it.
# The ExternalSecret for git-creds lives in argocd/, not external-secrets/.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: gcp-secret-manager
spec:
  provider:
    gcpsm:
      projectID: project-385a0cab-c44a-4b07-926
      auth:
        # ESO authenticates as its own KSA. The KSA's
        # `iam.gke.io/gcp-service-account` annotation maps to the GCP SA
        # `eso-sm-reader@…` which has secretmanager.secretAccessor.
        workloadIdentity:
          clusterLocation: us-central1-a
          clusterName: devops-hub
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
